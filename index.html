<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI NPC м„Өл“қ кІҢмһ„: кі м§‘л¶ҲнҶө м „кө¬ лЎңлҙҮмқ„ мјңлқј! (Gemini лІ„м „)</title>
    <script src="https://code.jquery.com/jquery-1.12.4.min.js"
        integrity="sha256-ZosEbRLbNQzLpnKIkEdrPv7lOy9C27hHQ+Xp8a4MxAQ=" crossorigin="anonymous"></script>
    <script src="./config.js"></script>
    <style>
        /* --- кё°ліё лҰ¬м…Ӣ л°Ҹ л Ҳмқҙм•„мӣғ --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Malgun Gothic', 'л§‘мқҖ кі л”•', Arial, sans-serif;
        }

        body {
            background-color: #1a1e24;
            color: #ffffff;
            padding: 20px;
        }

        #game-container {
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            background-color: #2c323f;
            border: 4px solid #4f5d75;
            border-radius: 10px;
            padding: 20px;
            overflow: hidden;
        }

        /* --- мғҒлӢЁ: лҢҖмӢңліҙл“ң нҢЁл„җ --- */
        .dashboard-panel {
            background-color: #1f242e;
            border: 2px solid #3d4859;
            border-radius: 6px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .timer-box {
            float: left;
            width: 30%;
            font-size: 14px;
            font-weight: bold;
            color: #ff6b6b;
            line-height: 30px;
        }

        .gauge-box {
            float: right;
            width: 70%;
            text-align: right;
        }

        .gauge-label {
            display: inline-block;
            font-size: 14px;
            font-weight: bold;
            color: #ffd166;
            margin-right: 10px;
            vertical-align: middle;
        }

        .progress-container {
            display: inline-block;
            width: 150px;
            height: 20px;
            background-color: #11141a;
            border: 2px solid #4f5d75;
            border-radius: 10px;
            vertical-align: middle;
            overflow: hidden;
            position: relative;
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            background-color: #06d6a0;
            position: absolute;
            top: 0;
            left: 0;
        }

        .clear-float {
            clear: both;
        }

        /* --- мӨ‘м•ҷ: лЎңлҙҮ л°Ҹ л§җн’Қм„  UI --- */
        .stage-area {
            position: relative;
            height: 280px;
            background-color: #222831;
            border: 2px dashed #4f5d75;
            border-radius: 6px;
            margin-bottom: 20px;
            padding: 15px;
        }

        .speech-bubble {
            position: relative;
            background: #ffffff;
            color: #333333;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 20px;
            font-size: 14px;
            font-weight: bold;
            line-height: 1.5;
            border: 3px solid #ffd166;
            min-height: 60px;
        }

        .speech-bubble:after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 0;
            height: 0;
            border: 15px solid transparent;
            border-top-color: #ffffff;
            border-bottom: 0;
            border-left: 0;
            margin-left: -7.5px;
            margin-bottom: -15px;
        }

        .robot-volt {
            width: 100px;
            margin: 20px auto 0 auto;
            text-align: center;
            position: relative;
        }

        .robot-bulb {
            width: 30px;
            height: 30px;
            background-color: #555555;
            border-radius: 50%;
            margin: 0 auto;
            border: 2px solid #ffffff;
        }

        .robot-head {
            width: 60px;
            height: 50px;
            background-color: #a3b1c6;
            border: 2px solid #4f5d75;
            border-radius: 6px;
            margin: 0 auto;
            position: relative;
        }

        .robot-eye {
            width: 10px;
            height: 10px;
            background-color: #00bcd4;
            border-radius: 50%;
            position: absolute;
            top: 15px;
        }

        .robot-eye.left {
            left: 12px;
        }

        .robot-eye.right {
            right: 12px;
        }

        .robot-body {
            width: 80px;
            height: 70px;
            background-color: #708090;
            border: 2px solid #4f5d75;
            border-radius: 4px;
            margin: 2px auto 0 auto;
        }

        /* --- н•ҳлӢЁ: мұ„нҢ… мһ…л Ҙм°Ҫ UI --- */
        .input-panel {
            background-color: #1f242e;
            padding: 10px;
            border-radius: 6px;
            border: 2px solid #3d4859;
        }

        .chat-input {
            width: 78%;
            height: 40px;
            padding: 0 10px;
            font-size: 14px;
            border: 2px solid #4f5d75;
            background-color: #11141a;
            color: #ffffff;
            border-radius: 4px;
            float: left;
        }

        .chat-input:focus {
            outline: none;
            border-color: #ffd166;
        }

        .send-btn {
            width: 20%;
            height: 40px;
            background-color: #ff9f1c;
            border: none;
            color: #ffffff;
            font-size: 14px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            float: right;
        }

        .send-btn:hover {
            background-color: #ffbf69;
        }
    </style>
</head>

<body>

    <div id="game-container">
        <div class="dashboard-panel">
            <div class="timer-box">
                лӮЁмқҖ мӢңк°„: <span id="timer-count">180</span>мҙҲ
            </div>
            <div class="gauge-box">
                <span class="gauge-label">м¶©м „ м җмҲҳ</span>
                <div class="progress-container">
                    <div id="charge-progress" class="progress-bar"></div>
                </div>
                <span id="score-text" style="font-size:14px; font-weight:bold; margin-left:5px;">0%</span>
            </div>
            <div class="clear-float"></div>
        </div>

        <div class="stage-area">
            <div id="volt-bubble" class="speech-bubble">
                м№ҳмқө... лӮҳлҠ” м „кө¬ лЎңлҙҮ ліјнҠёлӢӨ. лӮҙ лЁёлҰ¬мқҳ м „кө¬лҘј мјңкі  мӢ¶лӢӨл©ҙ, 'м „кё° нҡҢлЎңм—җм„ң м „кө¬м—җ л¶Ҳмқҙ л“Өм–ҙмҳӨлҠ” мӣҗлҰ¬'лҘј м •нҷ•н•ҳкІҢ л…јлҰ¬м ҒмңјлЎң м„ӨлӘ…н•ҙлҙҗлқј. лҢҖм¶© л§җн•ҳл©ҙ м ҲлҢҖ м•Ҳ л“Өмқ„ кұ°лӢӨ!
            </div>

            <div class="robot-volt">
                <div id="volt-bulb" class="robot-bulb"></div>
                <div class="robot-head">
                    <div class="robot-eye left"></div>
                    <div class="robot-eye right"></div>
                </div>
                <div class="robot-body"></div>
            </div>
        </div>

        <div class="input-panel">
            <input type="text" id="user-reasoning" class="chat-input" placeholder="мӣҗлҰ¬лҘј м„ӨлӘ…н•ҙмЈјм„ёмҡ” (мҳҲ: м „лҘҳ, нҡҢлЎң, лҸ„мІҙ нҸ¬н•Ё)..."
                autocomplete="off">
            <button type="button" id="btn-submit" class="send-btn">м „мҶЎ</button>
            <div class="clear-float"></div>
        </div>
    </div>

    <script>
        // --- кёҖлЎңлІҢ ліҖмҲҳ м„ м–ё (config.js м—°лҸҷ) ---
        // мқҙ кө¬мЎ°лҘј к·ёлҢҖлЎң мң м§Җн•ҳлҗҳ, н•ҳлӢЁм—җм„ң мқҙ ліҖмҲҳлӘ…мқ„ м •нҷ•нһҲ нҳём¶ңн•ҙм•ј н•©лӢҲлӢӨ.
        // ENV_CONFIG к°қмІҙк°Җ м •мқҳлҗҳм§Җ м•ҠмқҖ кІҪмҡ°лҘј лҢҖл№„н•ҳм—¬ кё°ліёк°’мқ„ м„Өм •н•©лӢҲлӢӨ.
        const GEMINI_API_KEY = (typeof ENV_CONFIG !== "undefined") ? ENV_CONFIG.GEMINI_API_KEY : "";
        let timeLeft = 180;
        let timerInterval = null;
        let isProcessing = false;
        // --- Gemini System Instruction (нҺҳлҘҙмҶҢлӮҳ) ---
        const systemInstruction = "л„ҲлҠ” мІңмһ¬ кіјн•ҷмһҗ м—җл””мҠЁмқҳ м—°кө¬мӢӨм—җ мһҲлҠ” м „кө¬ лЎңлҙҮ 'ліјнҠё(Volt)'м•ј. к№җк№җн•ҳкі  л…јлҰ¬м Ғмқҙл©°, мқёк°„мқҳ лҢҖм¶© н•ҳлҠ” м„ӨлӘ…мқҖ м•Ңм•„л“Јм§Җ лӘ»н•ҙ.\n" +
            "мң м Җ(мҙҲл“ұн•ҷмғқ кі н•ҷл…„)лҠ” мҳӨлҠҳ л°°мҡҙ 'м „кё° нҡҢлЎңм—җм„ң м „кө¬м—җ л¶Ҳмқҙ л“Өм–ҙмҳӨлҠ” мӣҗлҰ¬'лҘј л„Ҳм—җкІҢ м •нҷ•нһҲ м„ӨлӘ…н•ҙм„ң л„Ө м „мӣҗ(м „кө¬)мқ„ мјңм•ј н•ҙ.\n" +
            "[нҶөкіј мЎ°кұҙ]: мң м Җмқҳ лӢөліҖм—җ 'м „лҘҳ', 'нҡҢлЎң', 'м§Ғл ¬/лі‘л ¬', 'лҸ„мІҙ' л“ұ мҙҲл“ұ кіјн•ҷ көҗкіјм—җ лӮҳмҳӨлҠ” м •нҷ•н•ң лӘ…м№ӯмқҙ нҸ¬н•Ёлҗҳм–ҙм•ј н•ҳл©°, м „м„ мқҙ лҒҠкё°м§Җ м•Ҡкі  м—°кІ°лҗҳм–ҙм•ј м „лҘҳк°Җ нқҗлҘёлӢӨлҠ” кіјн•ҷм Ғ мқёкіјкҙҖкі„к°Җ лӘ…нҷ•н•ҙм•ј н•Ё.\n" +
            "мЎ°кұҙмқ„ л§ҢмЎұн•ҳл©ҙ statusлҘј successлЎң мЈјкі  scoreлҘј 80~100 мӮ¬мқҙлЎң мӨҳ. л¶ҖмЎұн•ҳл©ҙ statusлҘј failлЎң мЈјкі  scoreлҘј 0~50 мӮ¬мқҙлЎң кё°мһ¬н•ҙ.\n" +
            "м¶ңл ҘмқҖ л°ҳл“ңмӢң лӢӨлҘё м„ӨлӘ… м—Ҷмқҙ м•„лһҳ JSON мҳӨлёҢм қнҠё нҸ¬л§·мңјлЎңл§Ң мқ‘лӢөн•ҙмӨҳ:\n" +
            "{ \"status\": \"success\" лҳҗлҠ” \"fail\", \"score\": 0~100, \"reply\": \"лЎңлҙҮ нҠ№мң мқҳ к№җк№җн•ҳкі  м „мһҗмқҢмқҙ м„һмқё л§җнҲ¬ лҢҖмӮ¬\" }";

        $(document).ready(function () {
            startTimer();

            $("#btn-submit").click(function () {
                sendUserExplanation();
            });

            $("#user-reasoning").keypress(function (e) {
                if (e.which === 13) {
                    sendUserExplanation();
                }
            });
        });

        function startTimer() {
            timerInterval = setInterval(function () {
                timeLeft = timeLeft - 1;
                $("#timer-count").text(timeLeft);

                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    alert("м ңн•ң мӢңк°„мқҙ мҙҲкіјлҗҳм—ҲмҠөлӢҲлӢӨ! мӢңмҠӨн…ң мһ¬л¶ҖнҢ…...");
                    location.reload();
                }
            }, 1000);
        }

        // --- Gemini API нҳём¶ң л№„лҸҷкё° н•ЁмҲҳ ---
        // index.html лӮҙмқҳ кё°мЎҙ sendUserExplanation н•ЁмҲҳлҘј мқҙ мҪ”л“ңлЎң ліҖкІҪн•ҙ мЈјм„ёмҡ”.
        function sendUserExplanation() {
            if (isProcessing) return;

            // $.trimмқ„ мқҙмҡ©н•ҙ м•һл’Ө кіөл°ұмқ„ нҷ•мӢӨн•ҳкІҢ м ңкұ°н•©лӢҲлӢӨ.
            const userText = $.trim($("#user-reasoning").val());
            if (userText === "") {
                alert("мӣҗлҰ¬ м„ӨлӘ…мқ„ мһ…л Ҙн•ҙмЈјм„ёмҡ”!");
                return;
            }

            // ліҖмҲҳк°Җ м •мғҒм ҒмңјлЎң лЎңл“ңлҗҳм—ҲлҠ”м§Җ мөңмў… кІҖмҰқ
            if (typeof ENV_CONFIG === "undefined" || !ENV_CONFIG.GEMINI_API_KEY || ENV_CONFIG.GEMINI_API_KEY.indexOf("лӮҙ_мӢӨм ң") > -1) {
                alert("config.js нҢҢмқјмқҙ м—Ҷкұ°лӮҳ API Keyк°Җ мҳ¬л°”лҘҙм§Җ м•ҠмҠөлӢҲлӢӨ. лӢӨмӢң нҷ•мқён•ҙ мЈјм„ёмҡ”.");
                return;
            }

            // м•Ҳм „н•ҳкІҢ м–‘лҒқ кіөл°ұмқ„ м ңкұ°н•ң API Key м¶”м¶ң
            const apiKey = $.trim(ENV_CONFIG.GEMINI_API_KEY);

            isProcessing = true;
            $("#btn-submit").text("л¶„м„қмӨ‘...").prop("disabled", true);
            $("#volt-bubble").text("мӮҗ-лҰ¬лҰӯ... мң м Җмқҳ лӢөліҖмқ„ л¶„м„қ мӨ‘мқҙлӢӨ. мһ мӢңл§Ң кё°лӢӨл Өлқј...");

            // мЈјмҶҢмҷҖ нӮӨлҘј нҷ•мӢӨн•ҳкІҢ кІ°н•©н•©лӢҲлӢӨ.
            // лӘЁлҚёлӘ… лӘ…м„ёлҘј 2.0 лІ„м „мңјлЎң көҗмІҙн•©лӢҲлӢӨ.
            const geminiUrl = "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=" + GEMINI_API_KEY;
            // proлІ„м „
            // const geminiUrl = "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-pro:generateContent?key=" + GEMINI_API_KEY;

            const payload = {
                "contents": [{
                    "parts": [{ "text": userText }]
                }],
                "systemInstruction": {
                    "parts": [{ "text": systemInstruction }]
                },
                "generationConfig": {
                    "responseMimeType": "application/json"
                }
            };

            $.ajax({
                url: geminiUrl,
                type: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                data: JSON.stringify(payload),
                success: function (response) {
                    handleApiResponse(response);
                },
                error: function (xhr, status, error) {
                    console.error("Gemini API Error: ", error);
                    // 404лӮҳ м—җлҹ¬к°Җ лӮҳл©ҙ мӮ¬мҡ©мһҗм—җкІҢ н”јл“ңл°ұ м ңкіө
                    $("#volt-bubble").text("м№ҳмқҙмқө... мЈјмҶҢ м—°кІ° мӢӨнҢЁ(404) нҳ№мқҖ л„ӨнҠёмӣҢнҒ¬ м—җлҹ¬лӢӨ. API KeyлҘј лӢӨмӢң м җкІҖн•ҙлқј.");
                },
                complete: function () {
                    isProcessing = false;
                    $("#btn-submit").text("м „мҶЎ").prop("disabled", false);
                }
            });
        }

        function handleApiResponse(response) {
            try {
                // Geminiмқҳ мқ‘лӢө к°қмІҙ нҠёлҰ¬ нҢҢмӢұ
                const rawContent = response.candidates[0].content.parts[0].text;
                const resData = JSON.parse(rawContent);

                const status = resData.status;
                const score = resData.score;
                const reply = resData.reply;

                $("#volt-bubble").text(reply);

                $("#charge-progress").animate({
                    width: score + "%"
                }, 500);
                $("#score-text").text(score + "%");

                if (status === "success" || score >= 80) {
                    $("#volt-bulb").css("background-color", "#ffd166");
                    clearInterval(timerInterval);

                    setTimeout(function () {
                        alert("м¶•н•ҳн•©лӢҲлӢӨ! лЎңлҙҮ м¶©м „ мҷ„лЈҢ л°Ҹ нғҲм¶ң м„ұкіө!");
                    }, 600);
                } else {
                    timeLeft = timeLeft - 5;
                    if (timeLeft < 0) timeLeft = 0;
                    $("#timer-count").text(timeLeft);

                    $("#volt-bubble").css("border-color", "#ff6b6b");
                    setTimeout(function () {
                        $("#volt-bubble").css("border-color", "#ffd166");
                    }, 500);
                }

                $("#user-reasoning").val("");

            } catch (e) {
                console.error("JSON Parsing Error: ", e);
                $("#volt-bubble").text("м№ҳмқҙмқө... нҢҢмӢұ м—җлҹ¬ л°ңмғқ. лЎңлҙҮ мҳӨмһ‘лҸҷ мӨ‘...");
            }
        }
    </script>

</body>

</html>
